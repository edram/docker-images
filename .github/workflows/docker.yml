name: Docker
run-name: "Docker · edramkai/${{ inputs.image }}:${{ inputs.tag }}"

on:
  workflow_dispatch:
    inputs:
      image:
        type: choice
        description: 请选择需要构建的镜像
        options:
          - laravel
          - greatmall
        required: true
      tag:
        type: string
        description: 请输入镜像的版本号
        required: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      context: ${{ steps.config.outputs.context }}
      is_latest: ${{ steps.config.outputs.is_latest }}
      platforms: ${{ steps.config.outputs.platforms }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image configuration
        id: config
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          CONFIG_FILE: Dockerfile
        run: |
          context="./${IMAGE}/${TAG}"
          latest_tag="$(jq -r --arg image "$IMAGE" '.[$image].latest // empty' .github/docker-images.json)"
          platforms="$(jq -c --arg image "$IMAGE" --arg tag "$TAG" \
            '.[$image].tags[$tag].platforms // empty' \
            .github/docker-images.json)"

          test -f "$context/$CONFIG_FILE"
          test -n "$platforms"
          jq -e 'length > 0 and all(.[]; . == "linux/amd64" or . == "linux/arm64")' \
            <<< "$platforms" > /dev/null

          is_latest=false
          if [[ "$TAG" == "$latest_tag" ]]; then
            is_latest=true
          fi

          {
            echo "context=$context"
            echo "is_latest=$is_latest"
            echo "platforms=$platforms"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      context: ${{ needs.prepare.outputs.context }}
      output: image
      platforms: ${{ join(fromJSON(needs.prepare.outputs.platforms), ',') }}
      push: true
      sign: "false"
      meta-images: edramkai/${{ inputs.image }}
      meta-tags: |
        type=raw,value=${{ inputs.tag }},priority=200
        type=raw,value=latest,enable=${{ needs.prepare.outputs.is_latest == 'true' }},priority=100
      meta-flavor: latest=false
    secrets:
      registry-auths: |
        - registry: docker.io
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}
