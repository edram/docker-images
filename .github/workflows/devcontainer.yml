name: Dev Container
run-name: "Dev Container · edramkai/devcontainers-${{ inputs.image }}:${{ inputs.tag }}"

on:
  workflow_dispatch:
    inputs:
      image:
        type: choice
        description: 请选择需要构建的镜像
        options:
          - laravel
          - greatmall
        required: true
      tag:
        type: string
        description: 请输入镜像的版本号
        required: true

env:
  IMAGE_NAME: edramkai/devcontainers-${{ inputs.image }}
  IMAGE_TAG: ${{ inputs.tag }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      context: ${{ steps.config.outputs.context }}
      is_latest: ${{ steps.config.outputs.is_latest }}
      platforms: ${{ steps.config.outputs.platforms }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image configuration
        id: config
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          CONFIG_FILE: .devcontainer/devcontainer.json
        run: |
          context="./${IMAGE}/${TAG}"
          latest_tag="$(jq -r --arg image "$IMAGE" '.[$image].latest // empty' .github/docker-images.json)"
          platforms="$(jq -c --arg image "$IMAGE" --arg tag "$TAG" \
            '.[$image].tags[$tag].platforms // empty' \
            .github/docker-images.json)"

          test -f "$context/$CONFIG_FILE"
          test -n "$platforms"
          jq -e 'length > 0 and all(.[]; . == "linux/amd64" or . == "linux/arm64")' \
            <<< "$platforms" > /dev/null

          is_latest=false
          if [[ "$TAG" == "$latest_tag" ]]; then
            is_latest=true
          fi

          {
            echo "context=$context"
            echo "is_latest=$is_latest"
            echo "platforms=$platforms"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.prepare.outputs.platforms) }}
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push devcontainer
        uses: devcontainers/ci@v0.3
        with:
          subFolder: ${{ needs.prepare.outputs.context }}
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ env.IMAGE_TAG }}
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          cacheFrom: edramkai/${{ inputs.image }}:${{ inputs.tag }}
          push: always

  manifest:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    env:
      IS_LATEST: ${{ needs.prepare.outputs.is_latest }}
      PLATFORMS: ${{ needs.prepare.outputs.platforms }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge devcontainer manifests
        run: |
          tags=(--tag "${IMAGE_NAME}:${IMAGE_TAG}")
          if [[ "$IS_LATEST" == "true" ]]; then
            tags+=(--tag "${IMAGE_NAME}:latest")
          fi

          mapfile -t platforms < <(jq -r '.[]' <<< "$PLATFORMS")
          sources=()
          for platform in "${platforms[@]}"; do
            sources+=("${IMAGE_NAME}:${IMAGE_TAG}-${platform//\//-}")
          done

          docker buildx imagetools create \
            "${tags[@]}" \
            "${sources[@]}"
