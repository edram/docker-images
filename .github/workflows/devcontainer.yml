name: Dev Container
run-name: "Dev Container · edramkai/devcontainers-${{ inputs.image }}:${{ inputs.tag }}"

on:
  workflow_dispatch:
    inputs:
      image:
        type: choice
        description: 请选择需要构建的镜像
        options:
          - laravel
          - greatmall
        required: true
      tag:
        type: string
        description: 请输入镜像的版本号
        required: true

env:
  IMAGE_NAME: edramkai/devcontainers-${{ inputs.image }}
  IMAGE_TAG: ${{ inputs.tag }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      context: ${{ steps.config.outputs.context }}
      is_latest: ${{ steps.config.outputs.is_latest }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image configuration
        id: config
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
        run: |
          context="./${IMAGE}/${TAG}"
          latest_tag="$(jq -r --arg image "$IMAGE" '.[$image].latest // empty' .github/docker-images.json)"

          test -f "$context/.devcontainer/devcontainer.json"

          is_latest=false
          if [[ "$TAG" == "$latest_tag" ]]; then
            is_latest=true
          fi

          {
            echo "context=$context"
            echo "is_latest=$is_latest"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push devcontainer
        uses: devcontainers/ci@v0.3
        with:
          subFolder: ${{ needs.prepare.outputs.context }}
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ env.IMAGE_TAG }}
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          cacheFrom: edramkai/${{ inputs.image }}:${{ inputs.tag }}
          push: always

  manifest:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    env:
      IS_LATEST: ${{ needs.prepare.outputs.is_latest }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge devcontainer manifests
        run: |
          tags=(--tag "${IMAGE_NAME}:${IMAGE_TAG}")
          if [[ "$IS_LATEST" == "true" ]]; then
            tags+=(--tag "${IMAGE_NAME}:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "${IMAGE_NAME}:${IMAGE_TAG}-linux-amd64" \
            "${IMAGE_NAME}:${IMAGE_TAG}-linux-arm64"
