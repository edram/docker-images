name: Dev Container
run-name: "Dev Container · edramkai/${{ inputs.image }}:${{ inputs.tag }}-vscode"

on:
  workflow_dispatch:
    inputs:
      image:
        type: choice
        description: 请选择需要构建的镜像
        options:
          - laravel
          - greatmall
        required: true
      tag:
        type: string
        description: 请输入镜像的版本号
        default: latest

env:
  IMAGE_NAME: edramkai/${{ inputs.image }}
  IMAGE_TAG: ${{ inputs.tag }}-vscode
  BUILD_CONTEXT: ${{ inputs.tag == 'latest' && format('./{0}', inputs.image) || format('./{0}/{1}', inputs.image, inputs.tag) }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate build context
        run: test -f "$BUILD_CONTEXT/Dockerfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push devcontainer
        uses: devcontainers/ci@v0.3
        with:
          subFolder: ${{ env.BUILD_CONTEXT }}
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ env.IMAGE_TAG }}
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          cacheFrom: ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          push: always

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: edramkai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge devcontainer manifests
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_TAG}" \
            "${IMAGE_NAME}:${IMAGE_TAG}-linux-amd64" \
            "${IMAGE_NAME}:${IMAGE_TAG}-linux-arm64"
